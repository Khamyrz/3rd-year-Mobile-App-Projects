<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weather App</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>Weather App</h1>
        </div>
        
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for a city...">
            <button id="search-button">Search</button>
        </div>
        
        <div class="weather-container">
            <div id="weather-info">
                <div class="location-info">
                    <h2 id="location">Enter a location</h2>
                    <p id="date"></p>
                </div>
                
                <div class="weather-data">
                    <div class="temp-container">
                        <h2 id="temperature">--°C</h2>
                        <p id="feels-like">Feels like: --°C</p>
                    </div>
                    
                    <div class="weather-icon">
                        <img id="weather-icon" src="img/default.png" alt="Weather icon">
                        <p id="weather-description">--</p>
                    </div>
                </div>
                
                <div class="weather-details">
                    <div class="detail">
                        <p class="detail-label">Humidity</p>
                        <p id="humidity">--%</p>
                    </div>
                    <div class="detail">
                        <p class="detail-label">Wind</p>
                        <p id="wind">-- km/h</p>
                    </div>
                    <div class="detail">
                        <p class="detail-label">Pressure</p>
                        <p id="pressure">-- hPa</p>
                    </div>
                </div>
            </div>
            
            <div id="error-message" class="hidden">
                Location not found. Please try again.
            </div>
        </div>
    </div>

    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript" src="js/app.js"></script>
</body>
</html>
