<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Recipe Book</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Global Recipe Book</h1>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search for dishes...">
                <button id="searchButton">Search</button>
            </div>
        </header>
        
        <div class="tabs">
            <button class="tab-button active" data-tab="featured">Featured</button>
            <button class="tab-button" data-tab="categories">Categories</button>
            <button class="tab-button" data-tab="favorites">Favorites</button>
        </div>
        
        <div class="content-container">
            <div id="featured" class="tab-content active">
                <h2>Top Dishes From Around The World</h2>
                <div class="recipes-grid" id="featuredRecipes">
                    <!-- Recipes will be loaded here via JavaScript -->
                </div>
            </div>
            
            <div id="categories" class="tab-content">
                <h2>Browse by Region</h2>
                <div class="categories-list">
                    <div class="category-item" data-region="italian">
                        <img src="img/regions/italian.jpg" alt="Italian Cuisine">
                        <span>Italian</span>
                    </div>
                    <div class="category-item" data-region="asian">
                        <img src="img/regions/asian.jpg" alt="Asian Cuisine">
                        <span>Asian</span>
                    </div>
                    <div class="category-item" data-region="mexican">
                        <img src="img/regions/mexican.jpg" alt="Mexican Cuisine">
                        <span>Mexican</span>
                    </div>
                    <div class="category-item" data-region="mediterranean">
                        <img src="img/regions/mediterranean.jpg" alt="Mediterranean Cuisine">
                        <span>Mediterranean</span>
                    </div>
                    <div class="category-item" data-region="indian">
                        <img src="img/regions/indian.jpg" alt="Indian Cuisine">
                        <span>Indian</span>
                    </div>
                    <div class="category-item" data-region="american">
                        <img src="img/regions/american.jpg" alt="American Cuisine">
                        <span>American</span>
                    </div>
                </div>
            </div>
            
            <div id="favorites" class="tab-content">
                <h2>Your Favorite Recipes</h2>
                <div class="recipes-grid" id="favoriteRecipes">
                    <!-- Favorites will be loaded here via JavaScript -->
                    <p class="empty-state">You haven't saved any favorites yet. Click the heart icon on any recipe to save it here!</p>
                </div>
            </div>
        </div>
    </div>
    
    <div id="recipeModal" class="modal">
        <div class="modal-content">
            <span class="close-button">&times;</span>
            <div id="recipeDetails">
                <!-- Recipe details will be loaded here via JavaScript -->
            </div>
        </div>
    </div>

    <script type="text/javascript" src="cordova.js"></script>
    <script type="text/javascript" src="js/app.js"></script>
</body>
</html>
