<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOME - Bantayan Island</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: #0088cc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 100%;
            width: 100%;
            animation: fadeIn 1s ease-in;
        }

        .logo-container {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 25%;
            margin: 0 auto 2rem;
            padding: 20px;
            animation: scaleIn 0.8s ease-out;
        }

        .logo {
            width: 100%;
            height: 100%;
            animation: float 3s ease-in-out infinite;
        }

        .title {
            color: white;
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 1rem;
            animation: slideUp 0.8s ease-out;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            margin-bottom: 3rem;
            line-height: 1.5;
            animation: slideUp 1s ease-out;
        }

        .btn-get-started {
            background: #000;
            color: white;
            border: none;
            padding: 1rem 3rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            animation: slideUp 1.2s ease-out;
        }

        .btn-get-started:hover {
            background: #222;
            transform: translateY(-2px);
        }

        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 1.5rem;
            }
            .title {
                font-size: 2rem;
            }
            .subtitle {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="img/biome.jpg" alt="BIOME Logo" class="logo">
        </div>
        <h1 class="title">BIOME</h1>
        <p class="subtitle">Bantayan Island<br>Outreach for Marine & Economy</p>
        <button class="btn-get-started" onclick="window.location.href='landing.html'">GET STARTED</button>
    </div>
</body>
</html>
