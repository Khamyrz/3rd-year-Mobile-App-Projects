<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOME - Login</title>
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>
    <!-- Your Firebase Config -->
    <script src="js/firebase-config.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="img/logo.png" alt="BIOME Logo" class="auth-logo">
                <h1>Welcome Back</h1>
                <p>Login to your BIOME account</p>
            </div>

            <div id="notification" class="notification" style="display: none;"></div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" class="form-control" required>
                        <button type="button" id="togglePassword" onclick="togglePasswordVisibility('password', 'togglePassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <label for="rememberMe">Remember me</label>
                    </div>
                    <a href="#" onclick="forgotPassword(); return false;" class="forgot-password">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>

                <div class="social-login">
                    <button type="button" onclick="signInWithGoogle()" class="btn btn-google">
                        <i class="fab fa-google"></i> Continue with Google
                    </button>
                    <button type="button" onclick="signInWithFacebook()" class="btn btn-facebook">
                        <i class="fab fa-facebook-f"></i> Continue with Facebook
                    </button>
                </div>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <!-- Authentication Script -->
    <script src="js/auth.js"></script>
    <script>
        // Initialize providers
        const googleProvider = new firebase.auth.GoogleAuthProvider();
        const facebookProvider = new firebase.auth.FacebookAuthProvider();

        // Add form submit event listener
        document.getElementById('loginForm').addEventListener('submit', loginUser);

        // Forgot Password function
        async function forgotPassword() {
            const email = document.getElementById('email').value;

            if (!email) {
                showNotification('error', 'Please enter your email address');
                return;
            }

            try {
                await auth.sendPasswordResetEmail(email);
                showNotification('success', 'Password reset email sent. Please check your inbox.');
            } catch (error) {
                showNotification('error', error.message);
            }
        }

        // Social Sign In functions
        async function signInWithGoogle() {
            try {
                const result = await auth.signInWithPopup(googleProvider);
                const user = result.user;
                
                // Check if user exists in Firestore
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    // New user - redirect to registration
                    window.location.href = 'register.html?provider=google';
                }
                // If user exists, the auth state observer will handle the redirect
            } catch (error) {
                showNotification('error', error.message);
            }
        }

        async function signInWithFacebook() {
            try {
                const result = await auth.signInWithPopup(facebookProvider);
                const user = result.user;
                
                // Check if user exists in Firestore
                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    // New user - redirect to registration
                    window.location.href = 'register.html?provider=facebook';
                }
                // If user exists, the auth state observer will handle the redirect
            } catch (error) {
                showNotification('error', error.message);
            }
        }
    </script>
</body>
</html>
