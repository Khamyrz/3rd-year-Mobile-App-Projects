<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOME - My Wishlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="../../css/dashboard.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block bg-light sidebar">
                <div class="position-sticky pt-3">
                    <ul class="nav flex-column">
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">
                                <i class="fas fa-home"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="orders.html">
                                <i class="fas fa-shopping-bag"></i> My Orders
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="wishlist.html">
                                <i class="fas fa-heart"></i> Wishlist
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="reviews.html">
                                <i class="fas fa-star"></i> My Reviews
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="settings.html">
                                <i class="fas fa-cog"></i> Settings
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>

            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">My Wishlist</h1>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <div class="input-group me-2">
                            <input type="text" class="form-control" id="searchInput" placeholder="Search wishlist...">
                            <button class="btn btn-outline-secondary" type="button" id="searchBtn">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                        <div class="dropdown">
                            <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="sortDropdown" data-bs-toggle="dropdown">
                                Sort By
                            </button>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#" data-sort="date">Date Added</a></li>
                                <li><a class="dropdown-item" href="#" data-sort="price-low">Price: Low to High</a></li>
                                <li><a class="dropdown-item" href="#" data-sort="price-high">Price: High to Low</a></li>
                                <li><a class="dropdown-item" href="#" data-sort="rating">Rating</a></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <!-- Wishlist Grid -->
                <div class="row row-cols-1 row-cols-md-3 g-4" id="wishlistGrid">
                    <!-- Wishlist items will be populated by JavaScript -->
                </div>

                <!-- Empty State -->
                <div class="text-center py-5" id="emptyState" style="display: none;">
                    <i class="fas fa-heart fa-4x text-muted mb-3"></i>
                    <h3>Your wishlist is empty</h3>
                    <p class="text-muted">Start exploring tours and save your favorites!</p>
                    <a href="../marketplace.html" class="btn btn-primary">Explore Tours</a>
                </div>
            </main>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="modal fade" id="shareModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Share Tour</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Share via:</label>
                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-primary flex-grow-1">
                                <i class="fab fa-facebook"></i> Facebook
                            </button>
                            <button class="btn btn-outline-info flex-grow-1">
                                <i class="fab fa-twitter"></i> Twitter
                            </button>
                            <button class="btn btn-outline-success flex-grow-1">
                                <i class="fab fa-whatsapp"></i> WhatsApp
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Or copy link:</label>
                        <div class="input-group">
                            <input type="text" class="form-control" id="shareLink" readonly>
                            <button class="btn btn-outline-secondary" type="button" onclick="copyShareLink()">
                                <i class="fas fa-copy"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize wishlist
            loadWishlist();

            // Event listeners
            document.getElementById('searchBtn').addEventListener('click', searchWishlist);
            document.getElementById('searchInput').addEventListener('keyup', function(e) {
                if (e.key === 'Enter') searchWishlist();
            });

            // Sort dropdown event listeners
            document.querySelectorAll('.dropdown-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    sortWishlist(this.dataset.sort);
                });
            });
        });

        function loadWishlist() {
            // Simulated API call to get wishlist items
            // Replace with actual API call
            const wishlistItems = [
                {
                    id: 'TOUR-001',
                    name: 'Cebu City Heritage Walk',
                    image: '../../img/tours/cebu-heritage.jpg',
                    price: '₱2,500',
                    rating: 4.8,
                    reviews: 156,
                    guide: 'Maria Santos',
                    dateAdded: '2024-03-01'
                },
                {
                    id: 'TOUR-002',
                    name: 'Palawan Island Hopping',
                    image: '../../img/tours/palawan-island.jpg',
                    price: '₱3,500',
                    rating: 4.9,
                    reviews: 234,
                    guide: 'John Rivera',
                    dateAdded: '2024-03-05'
                }
            ];

            updateWishlistDisplay(wishlistItems);
        }

        function updateWishlistDisplay(items) {
            const grid = document.getElementById('wishlistGrid');
            const emptyState = document.getElementById('emptyState');

            if (items.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'flex';
            emptyState.style.display = 'none';
            grid.innerHTML = '';

            items.forEach(item => {
                const col = document.createElement('div');
                col.className = 'col';
                col.innerHTML = `
                    <div class="card h-100">
                        <img src="${item.image}" class="card-img-top" alt="${item.name}" onerror="this.src='../../img/placeholder.jpg'">
                        <div class="card-body">
                            <h5 class="card-title">${item.name}</h5>
                            <p class="card-text">
                                <i class="fas fa-star text-warning"></i> ${item.rating} (${item.reviews} reviews)<br>
                                <i class="fas fa-user"></i> Guide: ${item.guide}<br>
                                <i class="fas fa-tag"></i> ${item.price}
                            </p>
                            <div class="d-flex justify-content-between align-items-center">
                                <button class="btn btn-primary" onclick="bookTour('${item.id}')">Book Now</button>
                                <div class="btn-group">
                                    <button class="btn btn-outline-secondary" onclick="shareTour('${item.id}')">
                                        <i class="fas fa-share-alt"></i>
                                    </button>
                                    <button class="btn btn-outline-danger" onclick="removeFromWishlist('${item.id}')">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer text-muted">
                            Added on ${new Date(item.dateAdded).toLocaleDateString()}
                        </div>
                    </div>
                `;
                grid.appendChild(col);
            });
        }

        function searchWishlist() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            // Implement search functionality
            loadWishlist(); // Temporary: Reload all items
            // TODO: Filter items based on search term
        }

        function sortWishlist(sortBy) {
            // Implement sort functionality
            loadWishlist(); // Temporary: Reload all items
            // TODO: Sort items based on criteria
        }

        function bookTour(tourId) {
            // Implement booking functionality
            window.location.href = `../tours/booking.html?id=${tourId}`;
        }

        function shareTour(tourId) {
            const shareModal = new bootstrap.Modal(document.getElementById('shareModal'));
            document.getElementById('shareLink').value = `https://biome.com/tours/${tourId}`;
            shareModal.show();
        }

        function removeFromWishlist(tourId) {
            if (confirm('Are you sure you want to remove this tour from your wishlist?')) {
                // Implement remove functionality
                // TODO: Make API call to remove item
                loadWishlist(); // Reload wishlist after removal
            }
        }

        function copyShareLink() {
            const shareLink = document.getElementById('shareLink');
            shareLink.select();
            document.execCommand('copy');
            alert('Link copied to clipboard!');
        }
    </script>
</body>
</html>
