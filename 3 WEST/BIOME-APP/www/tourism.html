<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIOME - Tourism</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: #0088cc;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            color: white;
        }

        .back-button {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            flex-grow: 1;
            margin: 0 20px;
        }

        .book-tour {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 25px;
            color: white;
            padding: 15px;
            width: 100%;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .book-tour:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .tour-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tour-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .tour-info {
            padding: 20px;
        }

        .tour-title {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .tour-description {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .tour-features {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 0.9rem;
        }

        .feature i {
            color: #0088cc;
        }

        .book-button {
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 25px;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .book-button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-button" onclick="window.location.href='main.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="page-title">TOURISM</div>
            <button class="menu-button">
                <div class="hamburger-menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </button>
        </div>

        <button class="book-tour">
            <i class="fas fa-calendar-alt"></i>
            BOOK TOUR
        </button>

        <div class="tour-card">
            <img src="img/island-hopping.jpg" alt="Island Hopping" class="tour-image">
            <div class="tour-info">
                <h2 class="tour-title">Island Hopping</h2>
                <p class="tour-description">Explore Pristine islands boat. Experience crystal clear waters and stunning beaches.</p>
                <div class="tour-features">
                    <div class="feature">
                        <i class="fas fa-clock"></i>
                        <span>4 hours</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-users"></i>
                        <span>Max 10</span>
                    </div>
                    <div class="feature">
                        <i class="fas fa-star"></i>
                        <span>4.8</span>
                    </div>
                </div>
                <button class="book-button">
                    <span>Book Now</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>Menu</h2>
            <button class="close-sidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="profile-section">
            <img src="img/default-avatar.png" alt="Profile" class="profile-image">
            <div class="profile-name">Guest</div>
            <div class="profile-role">Visitor</div>
            <a href="login.html" class="login-link">No Account? Login here</a>
        </div>
        <div class="menu-items">
            <a href="marketplace.html" class="menu-item">
                <i class="fas fa-store"></i>
                Marketplace
            </a>
            <a href="tourism.html" class="menu-item">
                <i class="fas fa-umbrella-beach"></i>
                Tourism
            </a>
            <a href="learning.html" class="menu-item">
                <i class="fas fa-book-reader"></i>
                Learning Center
            </a>
        </div>
    </div>
    <div class="overlay"></div>

    <script src="js/sidebar.js"></script>
</body>
</html>
