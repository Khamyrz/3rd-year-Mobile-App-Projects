<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marthada - Ride Sharing</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="landing">
        <div class="logo-container">
            <img src="img/logo.png" alt="Marthada Logo" class="logo">
            <h1>MARTHADA</h1>
            <p>Local Ride-Sharing Made Easy</p>
        </div>
        
        <div class="role-selection">
            <h2>Choose Your Role</h2>
            <div class="buttons">
                <a href="rider-login.html" class="btn btn-primary">
                    <i class="fas fa-motorcycle"></i> I'm a Rider
                </a>
                <a href="customer-login.html" class="btn btn-secondary">
                    <i class="fas fa-user"></i> I'm a Customer
                </a>
                <a href="admin-login.html" class="btn btn-tertiary">
                    <i class="fas fa-user-shield"></i> Admin Panel
                </a>
            </div>
        </div>
        
        <footer>
            <p>&copy; 2025 Marthada. All rights reserved.</p>
        </footer>
    </div>
    
    <script src="cordova.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
