<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bantayan Island Pizza Shop Map</title>
  <!-- Font Awesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace;
      background-color: #ff6b6b; /* Vibrant red background */
    }

    #map-container {
      height: calc(100vh - 80px);
      width: 100%;
      position: relative;
      z-index: 1;
    }

    .leaflet-container {
      width: 100%;
      height: 100%;
    }

    .custom-marker {
      background-color: #4285F4;
      border: 2px solid white;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
    }

    /* Hide Leaflet watermark and attribution */
    .leaflet-control-attribution {
      display: none !important;
    }
    
    .leaflet-control-zoom {
      display: none !important;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background-color: #ffffff;
      border-top: 1px solid #eeeeee;
      display: flex;
      justify-content: space-around;
      align-items: center;
      box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
      padding: 0 10px;
      z-index: 1000;
    }

    .nav-item {
      text-align: center;
      font-size: 14px;
      color: #666;
      text-decoration: none;
      padding: 12px;
      border-radius: 12px;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .nav-item i {
      font-size: 1.5rem;
      transition: all 0.3s ease;
    }

    .nav-item.active {
      color: #4285F4;
      transform: translateY(-5px);
    }

    .nav-item.active i {
      color: #4285F4;
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <div id="map-container"></div>

  <!-- Bottom Navigation -->
  <div class="bottom-nav">
    <a href="home.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a href="map.html" class="nav-item active">
      <i class="fas fa-map-marked-alt"></i>
      <span>Map</span>
    </a>
    <a href="settings.html" class="nav-item">
      <i class="fas fa-cog"></i>
      <span>Settings</span>
    </a>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const map = L.map('map-container').setView([11.2697, 123.7234], 14);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors',
        maxZoom: 18,
      }).addTo(map);

      const farms = [
        { name: "Josephs Farm", lat: 11.2531369, lng: 123.7354571},
        { name: "JRCJL Poultry Farm", lat: 11.2430726, lng: 123.7193967 },
        { name: "Palo Poultry Farm", lat: 11.2481196, lng: 123.7138284 },
        { name: "Calilap Poultry Farm", lat: 11.2489164, lng: 123.7190041},
        { name: "AFI Poultry Farm", lat: 11.2463869, lng: 123.7236818},
        {name: "SEAL-South East Asia Farm", lat:11.2543496,lng: 123.7395924},
        {name: "RVF Farm", lat:11.2844040,lng: 123.7380038},
        {name: "JTAKS Poultry Farm", lat: 11.2569188, lng: 123.7230656},
        {name: "Batayola Poultry Farm", lat: 11.2828561,lng: 123.7416721},
        {name: "Yama Poultry Farm", lat: 11.280228, lng: 123.730945}
      ];

      farms.forEach(farm => {
        const marker = L.marker([farm.lat, farm.lng]).addTo(map);
        marker.bindPopup(`<strong>${farm.name}</strong><br><a href="details.html?farm=${encodeURIComponent(farm.name)}">View Details</a>`);
      });

      // Navigation active highlight
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function () {
          document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
          this.classList.add('active');
        });
      });
    });
  </script>
</body>
</html>
